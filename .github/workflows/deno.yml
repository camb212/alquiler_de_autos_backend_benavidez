name: Alquiler Autos — CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  # ── Job 1: Tests ──────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB:       shopapi_test_db
          POSTGRES_USER:     shopapi_user
          POSTGRES_PASSWORD: shopapi_pass_123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        env:
          SECRET_KEY:    test-secret-key-for-ci-only
          DEBUG:         True
          ALLOWED_HOSTS: localhost,127.0.0.1
          DB_NAME:       shopapi_test_db
          DB_USER:       shopapi_user
          DB_PASSWORD:   shopapi_pass_123
          DB_HOST:       localhost
          DB_PORT:       5432
          TEST_DB_NAME:  shopapi_test_db
          CORS_ALLOW_ALL_ORIGINS: True
        # Se remueve 'store' para que Django testee de manera global o añade tu app real ('rental')
        run: uv run python manage.py test --verbosity=2

  # ── Job 2: Deploy ─────────────────────────────────────────
  deploy:
    name: Deploy to Azure VM
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VM
        env:
          VPS_HOST:    ${{ secrets.VPS_HOST }}
          VPS_USER:    ${{ secrets.VPS_USERNAME }}
        run: |
          # Pasamos explícitamente el DEPLOY_PATH corregido al entorno de SSH remoto
          ssh $VPS_USER@$VPS_HOST DEPLOY_PATH="/home/Cami123/alquiler_autos/alquiler_de_autos_backend_benavidez" 'bash -s' << 'ENDSSH'
            set -e

            echo "── 1. Actualizando código ──"
            cd "$DEPLOY_PATH"
            git fetch origin
            git reset --hard origin/main

            echo "── 2. Instalando dependencias ──"
            uv sync --frozen

            echo "── 3. Aplicando migraciones ──"
            uv run python manage.py migrate --noinput

            echo "── 4. Recolectando estáticos ──"
            uv run python manage.py collectstatic --noinput --clear

            echo "── 5. Ajustando permisos de estáticos ──"
            sudo chown -R Cami123:www-data staticfiles
            sudo chmod -R 755 staticfiles

            echo "── 6. Reiniciando servicios ──"
            sudo systemctl restart gunicorn
            sudo systemctl restart nginx

            echo "── 7. Verificando salud de la API ──"
            sleep 3
            # Probamos apuntando a la administración pública que sabemos que existe por defecto
            curl -sf http://127.0.0.1/admin/ && echo "API OK" || echo "API ERROR"

            echo "Despliegue completado exitosamente"
          ENDSSH
